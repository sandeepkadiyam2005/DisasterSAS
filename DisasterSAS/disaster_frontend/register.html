<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — DisasterSAS</title>
    <meta name="description" content="Create an account on DisasterSAS">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="auth-page">
        <div class="auth-card">
            <h1>🌍 Create Account</h1>
            <p class="subtitle">Join DisasterSAS to stay safe</p>

            <div class="auth-error" id="error"></div>

            <form id="registerForm" onsubmit="return handleRegister(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Choose a username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Create a password" required>
                </div>

                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" class="form-control">
                        <option value="public">Public</option>
                        <option value="volunteer">Volunteer</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="index.html">Sign in</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if (getToken()) redirectToDefaultPage();

        async function handleRegister(e) {
            e.preventDefault();
            const errEl = document.getElementById("error");
            const btn = document.getElementById("submitBtn");
            errEl.style.display = "none";

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const role = document.getElementById("role").value;

            if (!username || !password) {
                errEl.textContent = "Please fill in all fields";
                errEl.style.display = "block";
                return false;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Creating account…';

            try {
                await apiPost("/register", { username, password, role });
                // Auto-login after registration
                const loginData = await apiPost("/login", { username, password });
                setAuth(loginData.access_token, loginData.role, username, loginData.permissions || []);
                redirectToDefaultPage();
            } catch (err) {
                errEl.textContent = err.error || "Registration failed. Username may already exist.";
                errEl.style.display = "block";
                btn.disabled = false;
                btn.textContent = "Create Account";
            }

            return false;
        }
    </script>

</body>

</html>
