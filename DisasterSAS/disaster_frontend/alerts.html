<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts — DisasterSAS</title>
    <meta name="description" content="Manage disaster alert bulletins">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="main" id="mainContent">
        <div class="page-header" style="display:flex;justify-content:space-between;align-items:center">
            <div>
                <h1>🚨 Alerts Management</h1>
                <p>Create, edit, and manage disaster alert bulletins</p>
                <div id="alertsAccessNote" style="display:none;margin-top:6px;font-size:.8rem;color:var(--text-muted);">
                    Admin only: create, edit, and delete alerts.
                </div>
            </div>
            <button class="btn btn-primary" id="newAlertBtn" onclick="openModal('alertModal'); resetForm()">+ New Alert</button>
        </div>

        <div id="alertsList">
            <div class="loading-overlay"><span class="spinner"></span> Loading alerts…</div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="alertModal">
        <div class="modal">
            <h2 id="modalTitle">New Alert</h2>
            <input type="hidden" id="editId">

            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" class="form-control" placeholder="Alert title" required>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" class="form-control" placeholder="Detailed alert message" required></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="severity">Severity</label>
                    <select id="severity" class="form-control">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                        <option value="critical">Critical</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" class="form-control">
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('alertModal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveAlert()" id="saveBtn">Save Alert</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if (!requirePagePermission("alerts:view")) throw "redirect";
        buildSidebar("alerts.html");
        const canManageAlerts = can("alerts:manage");
        if (canManageAlerts) {
            document.getElementById("alertsAccessNote").style.display = "block";
        }
        if (!canManageAlerts) {
            document.getElementById("newAlertBtn").style.display = "none";
        }

        function resetForm() {
            document.getElementById("editId").value = "";
            document.getElementById("title").value = "";
            document.getElementById("message").value = "";
            document.getElementById("severity").value = "medium";
            document.getElementById("date").value = "";
            document.getElementById("modalTitle").textContent = "New Alert";
        }

        async function loadAlerts() {
            const container = document.getElementById("alertsList");
            try {
                const alerts = await apiGet("/alerts");

                if (!alerts.length) {
                    container.innerHTML = canManageAlerts
                        ? '<div class="empty-state"><div class="emoji">📋</div><p>No alerts yet. Create one to get started.</p></div>'
                        : '<div class="empty-state"><div class="emoji">📋</div><p>No alerts have been published yet.</p><p style="margin-top:6px;color:var(--text-muted);font-size:.8rem">You have read-only access on this page, so alerts will appear here when staff publish them.</p></div>';
                    return;
                }

                container.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead><tr><th>Title</th><th>Message</th><th>Severity</th><th>Date</th><th>Created</th><th>Actions</th></tr></thead>
            <tbody>
              ${alerts.map(a => `
                <tr>
                  <td><strong>${a.title}</strong></td>
                  <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.message}</td>
                  <td>${severityBadge(a.severity)}</td>
                  <td>${a.date || "—"}</td>
                  <td style="color:var(--text-muted);font-size:.82rem">${fmtDate(a.created_at)}</td>
                  <td>${canManageAlerts
                        ? `<button class="btn btn-secondary btn-sm" onclick='editAlert(${JSON.stringify(a)})'>✏️</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteAlert(${a.id})">🗑</button>`
                        : '<span style="color:var(--text-muted)">Read only</span>'}
                  </td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>`;
            } catch (err) {
                container.innerHTML = '<div class="empty-state"><div class="emoji">⚠</div><p>Failed to load alerts</p></div>';
            }
        }

        function editAlert(a) {
            if (!canManageAlerts) {
                showToast("Access Denied", "Only admin can modify alerts.");
                return;
            }
            document.getElementById("editId").value = a.id;
            document.getElementById("title").value = a.title;
            document.getElementById("message").value = a.message;
            document.getElementById("severity").value = a.severity;
            document.getElementById("date").value = a.date || "";
            document.getElementById("modalTitle").textContent = "Edit Alert";
            openModal("alertModal");
        }

        async function saveAlert() {
            if (!canManageAlerts) {
                showToast("Access Denied", "Only admin can modify alerts.");
                return;
            }
            const id = document.getElementById("editId").value;
            const body = {
                title: document.getElementById("title").value.trim(),
                message: document.getElementById("message").value.trim(),
                severity: document.getElementById("severity").value,
                date: document.getElementById("date").value || null
            };

            if (!body.title || !body.message) {
                showToast("⚠ Validation", "Title and message are required");
                return;
            }

            try {
                if (id) {
                    await apiPut("/alerts/" + id, body);
                    showToast("✅ Updated", "Alert updated successfully");
                } else {
                    await apiPost("/alerts", body);
                    showToast("✅ Created", "New alert created");
                }
                closeModal("alertModal");
                loadAlerts();
            } catch (err) {
                showToast("❌ Error", err.error || "Failed to save alert");
            }
        }

        async function deleteAlert(id) {
            if (!canManageAlerts) {
                showToast("Access Denied", "Only admin can modify alerts.");
                return;
            }
            if (!confirm("Delete this alert?")) return;
            try {
                await apiDelete("/alerts/" + id);
                showToast("🗑 Deleted", "Alert removed");
                loadAlerts();
            } catch (err) {
                showToast("❌ Error", err.error || "Failed to delete");
            }
        }

        loadAlerts();
    </script>

</body>

</html>
