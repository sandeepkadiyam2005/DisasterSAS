<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — DisasterSAS</title>
  <meta name="description" content="Login to DisasterSAS — Disaster Safety Alert System">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <h1>🌍 DisasterSAS</h1>
    <p class="subtitle">Disaster Safety Alert System</p>

    <div class="auth-error" id="error"></div>

    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter your username" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
      </div>

      <div class="auth-footer" style="margin-top:-4px;margin-bottom:14px;text-align:right;">
        <a href="forgot-password.html">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">
        Sign In
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Register here</a>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  // If already logged in, redirect to dashboard
  if (getToken()) redirectToDefaultPage();

  async function handleLogin(e) {
    e.preventDefault();
    const errEl = document.getElementById("error");
    const btn   = document.getElementById("submitBtn");
    errEl.style.display = "none";

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    if (!username || !password) {
      errEl.textContent = "Please fill in all fields";
      errEl.style.display = "block";
      return false;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in…';

    try {
      const data = await apiPost("/login", { username, password });
      setAuth(data.access_token, data.role, username, data.permissions || []);
      redirectToDefaultPage();
    } catch (err) {
      errEl.textContent = err.error || "Login failed. Check your credentials.";
      errEl.style.display = "block";
      btn.disabled = false;
      btn.textContent = "Sign In";
    }

    return false;
  }
</script>

</body>
</html>
