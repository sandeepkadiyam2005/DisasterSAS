<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — DisasterSAS</title>
    <meta name="description" content="Reset your DisasterSAS account password">
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-success {
            background: var(--success-bg);
            color: var(--success);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            font-size: .78rem;
            margin-bottom: 14px;
            display: none;
            border: 1px solid rgba(52, 211, 153, .22);
        }

        .muted-note {
            color: var(--text-muted);
            font-size: .76rem;
            margin-top: -8px;
            margin-bottom: 14px;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div class="auth-page">
        <div class="auth-card">
            <h1>🔐 Reset Password</h1>
            <p class="subtitle">Recover access to your DisasterSAS account</p>

            <div class="auth-error" id="error"></div>
            <div class="auth-success" id="success"></div>

            <form id="requestCodeForm" onsubmit="return requestResetCode(event)">
                <div class="form-group">
                    <label for="username">Username / Email</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter your username" required>
                </div>
                <button type="submit" class="btn btn-primary" id="requestBtn">
                    Send Reset Code
                </button>
            </form>

            <form id="confirmResetForm" onsubmit="return confirmReset(event)" style="margin-top:16px;display:none">
                <div class="form-group">
                    <label for="code">Reset Code</label>
                    <input type="text" id="code" class="form-control" placeholder="Enter 6-digit code" required>
                </div>
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="Enter new password" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter new password" required>
                </div>
                <p class="muted-note">Use at least 6 characters for your new password.</p>
                <button type="submit" class="btn btn-primary" id="confirmBtn">
                    Reset Password
                </button>
            </form>

            <div class="auth-footer">
                Remembered it? <a href="index.html">Back to Sign in</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        function showError(message) {
            const errEl = document.getElementById("error");
            const okEl = document.getElementById("success");
            okEl.style.display = "none";
            errEl.textContent = message;
            errEl.style.display = "block";
        }

        function showSuccess(message) {
            const errEl = document.getElementById("error");
            const okEl = document.getElementById("success");
            errEl.style.display = "none";
            okEl.textContent = message;
            okEl.style.display = "block";
        }

        async function requestResetCode(e) {
            e.preventDefault();
            const username = document.getElementById("username").value.trim();
            const requestBtn = document.getElementById("requestBtn");
            if (!username) {
                showError("Username is required");
                return false;
            }

            requestBtn.disabled = true;
            requestBtn.innerHTML = '<span class="spinner"></span> Sending code…';

            try {
                const data = await apiPost("/forgot-password/request", { username });
                document.getElementById("confirmResetForm").style.display = "block";
                if (data.reset_code) {
                    document.getElementById("code").value = data.reset_code;
                }
                showSuccess("Reset code generated. Enter it below with your new password.");
            } catch (err) {
                showError(err.error || "Unable to generate reset code.");
            } finally {
                requestBtn.disabled = false;
                requestBtn.textContent = "Send Reset Code";
            }
            return false;
        }

        async function confirmReset(e) {
            e.preventDefault();
            const confirmBtn = document.getElementById("confirmBtn");
            const username = document.getElementById("username").value.trim();
            const code = document.getElementById("code").value.trim();
            const newPassword = document.getElementById("newPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (!username || !code || !newPassword || !confirmPassword) {
                showError("All fields are required");
                return false;
            }
            if (newPassword.length < 6) {
                showError("New password must be at least 6 characters");
                return false;
            }
            if (newPassword !== confirmPassword) {
                showError("Passwords do not match");
                return false;
            }

            confirmBtn.disabled = true;
            confirmBtn.innerHTML = '<span class="spinner"></span> Resetting…';

            try {
                await apiPost("/forgot-password/confirm", {
                    username,
                    code,
                    new_password: newPassword
                });
                showSuccess("Password reset successful. Redirecting to login...");
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1200);
            } catch (err) {
                showError(err.error || "Password reset failed.");
            } finally {
                confirmBtn.disabled = false;
                confirmBtn.textContent = "Reset Password";
            }
            return false;
        }
    </script>
</body>

</html>
